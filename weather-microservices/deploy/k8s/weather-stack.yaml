apiVersion: v1
kind: Namespace
metadata:
  name: weather
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-config
  namespace: weather
data:
  AUTH_SERVICE_URL: http://auth-service:5000
  WEATHER_SERVICE_URL: http://weather-service:5000
  RABBITMQ_HOST: rabbitmq
  WEATHER_EVENTS_QUEUE: weather.events
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: weather
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/example/auth-service:latest
          ports:
            - containerPort: 5000
          env:
            - name: JWT_SECRET
              value: change-me
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: weather
spec:
  selector:
    app: auth-service
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service
  namespace: weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-service
  template:
    metadata:
      labels:
        app: weather-service
    spec:
      containers:
        - name: weather-service
          image: ghcr.io/example/weather-service:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: weather-config
---
apiVersion: v1
kind: Service
metadata:
  name: weather-service
  namespace: weather
spec:
  selector:
    app: weather-service
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/example/notification-service:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: weather-config
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: weather
spec:
  selector:
    app: notification-service
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: weather-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: weather
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
