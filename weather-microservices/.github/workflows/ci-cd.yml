name: weather-microservices-ci-cd

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, weather-service, notification-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.service }}/requirements.txt

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          DISABLE_CONSUMER: "true"
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t api-gateway:ci ./api-gateway
          docker build -t auth-service:ci ./auth-service
          docker build -t weather-service:ci ./weather-service
          docker build -t notification-service:ci ./notification-service

      - name: Validate compose
        run: docker compose config

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG_DATA != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config

      - name: Deploy manifests
        run: kubectl apply -f deploy/k8s/weather-stack.yaml
